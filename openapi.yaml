openapi: 3.1.0
info:
  title: GPT Betting API
  version: 1.0.0
servers:
  - url: https://SEU-PROJETO.vercel.app
paths:
  /api/health:
    get:
      operationId: getHealth
      summary: Verifica se a API está online
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
                  version:
                    type: string

  /api/match-overview:
    get:
      operationId: getMatchOverview
      summary: Retorna visão consolidada da partida
      parameters:
        - in: query
          name: home_team
          required: true
          schema:
            type: string
        - in: query
          name: away_team
          required: true
          schema:
            type: string
        - in: query
          name: competition
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Dados da partida
          content:
            application/json:
              schema:
                type: object
                properties:
                  home_team:
                    type: string
                  away_team:
                    type: string
                  competition:
                    type: string
                  summary:
                    type: object
                    properties:
                      home_form:
                        type: string
                      away_form:
                        type: string
                      zebra_potential:
                        type: string
                      favorite_risk:
                        type: string
                  stats:
                    type: object
                  notes:
                    type: array
                    items:
                      type: string

  /api/odds:
    get:
      operationId: getOdds
      summary: Retorna odds atuais para análise
      parameters:
        - in: query
          name: home_team
          required: true
          schema:
            type: string
        - in: query
          name: away_team
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Odds do jogo
          content:
            application/json:
              schema:
                type: object
                properties:
                  home_team:
                    type: string
                  away_team:
                    type: string
                  bookmaker:
                    type: string
                  odds:
                    type: object
                  updated_at:
                    type: string
                  notes:
                    type: array
                    items:
                      type: string
