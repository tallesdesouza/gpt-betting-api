  /api/odds-events:
    get:
      operationId: getOddsEvents
      summary: Lista jogos disponíveis nas odds
      parameters:
        - name: sport
          in: query
          required: false
          schema:
            type: string
            default: soccer
      responses:
        '200':
          description: Lista de jogos disponíveis
          content:
            application/json:
              schema:
                type: object
